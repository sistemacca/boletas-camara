<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Semana Comercial - Cámara de Comercio de Arauca</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 28px 20px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.1);
      border-top: 6px solid #007d42;
    }
    .logo { text-align: center; margin-bottom: 24px; }
    .logo h2 { color: #007d42; font-size: 22px; margin-bottom: 4px; }
    .logo p { color: #64748b; font-size: 13px; }
    .logo .empresa-nombre {
      display: inline-block;
      margin-top: 8px;
      background: #e6f4ec;
      color: #007d42;
      font-size: 13px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
    }
    .campo { margin-bottom: 14px; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #007d42;
      margin-bottom: 5px;
    }
    label span { color: #e11d48; }
    input {
      width: 100%;
      padding: 11px 13px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.2s;
    }
    input:focus {
      outline: none;
      border-color: #007d42;
      box-shadow: 0 0 0 3px rgba(0,125,66,0.08);
    }
    input.error { border-color: #e11d48; }
    .msg-error {
      font-size: 11px;
      color: #e11d48;
      margin-top: 4px;
      display: none;
    }
    button {
      width: 100%;
      padding: 13px;
      background: #007d42;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    button:hover:not(:disabled) { background: #005a30; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    .resultado { margin-top: 20px; text-align: center; }
    .fallo {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 12px;
      color: #991b1b;
      font-size: 14px;
    }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid #ffffff55;
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 600px) {
      body { padding: 0; align-items: flex-start; justify-content: flex-start; }
      .card { max-width: 100%; min-height: 100vh; border-radius: 0; border-top: 6px solid #007d42; box-shadow: none; padding: 28px 20px; }
      input { font-size: 16px; }
      button { font-size: 16px; padding: 15px; }
    }
    @media (max-width: 480px) {
      body { padding: 12px; align-items: flex-start; padding-top: 20px; }
      .card { border-radius: 12px; padding: 24px 16px; }
      .logo h2 { font-size: 19px; }
      input { font-size: 16px; padding: 13px; }
      button { font-size: 16px; padding: 15px; }
    }
  </style>
</head>
<body>

<div class="card" id="card-formulario">
  <div class="logo">
    <img src="https://sistemacca.github.io/boletas-camara/logo.png" style="height:50px;margin-bottom:12px"><br><h2>Semana Comercial</h2>
    <span class="empresa-nombre" id="empresa-label">Cargando...</span>
  </div>

  <div id="formulario" style="display:none">
    <div class="campo">
      <label for="nombre">Nombre completo <span>*</span></label>
      <input type="text" id="nombre" autocomplete="name" placeholder="Tu nombre completo">
      <div class="msg-error" id="err-nombre">Ingresa tu nombre</div>
    </div>
    <div class="campo">
      <label for="telefono">Teléfono <span>*</span></label>
      <input type="tel" id="telefono" inputmode="numeric" autocomplete="tel" placeholder="3XXXXXXXXX" maxlength="12">
      <div class="msg-error" id="err-telefono">Ingresa un número de 10 dígitos</div>
    </div>
    <div class="campo">
      <label for="email">Email</label>
      <input type="email" id="email" autocomplete="email" placeholder="correo@ejemplo.com">
      <div class="msg-error" id="err-email">Ingresa un email válido</div>
    </div>
    <div class="campo">
      <label for="direccion">Dirección</label>
      <input type="text" id="direccion" autocomplete="street-address" placeholder="Opcional">
    </div>
    <button id="btn" onclick="registrar()">Registrar</button>
  </div>

  <div class="resultado" id="resultado"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getFirestore, collection, addDoc, runTransaction, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD75kntcW_TqAJznShE50ACAgvgjp1DlQc",
    authDomain: "semana-comercial.firebaseapp.com",
    projectId: "semana-comercial",
    storageBucket: "semana-comercial.firebasestorage.app",
    messagingSenderId: "52687643666",
    appId: "1:52687643666:web:48e7106b88b2f2c2b364cb"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const EMPRESA = new URLSearchParams(window.location.search).get("empresa") || "";

  async function cargarEmpresa() {
    const resultado = document.getElementById("resultado");
    if (!EMPRESA) {
      resultado.innerHTML = '<p class="fallo">Enlace sin empresa. Contacta al organizador.</p>';
      document.getElementById("empresa-label").textContent = "Sin empresa";
      return;
    }
    try {
      const snap = await getDoc(doc(db, "empresas", EMPRESA));
      if (!snap.exists()) {
        resultado.innerHTML = '<p class="fallo">Empresa no registrada. Contacta al organizador.</p>';
        document.getElementById("empresa-label").textContent = "No encontrada";
        return;
      }
      const data = snap.data();
      document.getElementById("empresa-label").textContent = data.nombre || EMPRESA;
      document.getElementById("formulario").style.display = "block";
    } catch (e) {
      resultado.innerHTML = '<p class="fallo">Error al cargar. Intenta de nuevo.</p>';
    }
  }

  cargarEmpresa();

  function esEmailValido(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }
  function esTelefonoValido(t) { let l = t.replace(/\D/g, ""); if (l.length === 12 && l.startsWith("57")) l = l.substring(2); return l.length === 10; }
  function marcar(inputId, errId, valido) { document.getElementById(inputId).classList.toggle("error", !valido); document.getElementById(errId).style.display = valido ? "none" : "block"; return valido; }

  window.registrar = async function () {
    const nombre = document.getElementById("nombre").value.trim();
    const telefono = document.getElementById("telefono").value.trim();
    const email = document.getElementById("email").value.trim();
    const direccion = document.getElementById("direccion").value.trim();
    const btn = document.getElementById("btn");
    const resultado = document.getElementById("resultado");

    resultado.innerHTML = "";

    let ok = true;
    ok = marcar("nombre", "err-nombre", nombre.length >= 2) && ok;
    ok = marcar("telefono", "err-telefono", esTelefonoValido(telefono)) && ok;
    if (email) ok = marcar("email", "err-email", esEmailValido(email)) && ok;
    if (!ok) return;

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Procesando...';

    try {
      const empresaRef = doc(db, "empresas", EMPRESA);
      const contadorRef = doc(db, "contadores", EMPRESA);
      let numeroBoleta;

      await runTransaction(db, async (tx) => {
        const empSnap = await tx.get(empresaRef);
        if (!empSnap.exists()) throw new Error("Empresa no encontrada");
        const { desde, hasta } = empSnap.data();
        const contSnap = await tx.get(contadorRef);
        const actual = contSnap.exists() ? contSnap.data().actual : 0;
        const siguiente = desde + actual;
        if (siguiente > hasta) throw new Error("Boletas agotadas para esta empresa");
        numeroBoleta = siguiente;
        tx.set(contadorRef, { actual: actual + 1 });
      });

      await addDoc(collection(db, "registros"), {
        empresa: EMPRESA,
        boleta: numeroBoleta,
        nombre,
        telefono,
        email: email || "",
        direccion: direccion || "",
        fecha: new Date().toISOString()
      });

      const empresaNombre = document.getElementById("empresa-label").textContent || EMPRESA;

      // 🔥 REDIRIGIR A LA PÁGINA DE COMPROBANTE 🔥
      const urlComprobante = `comprobante.html?nombre=${encodeURIComponent(nombre)}&boleta=${numeroBoleta}&empresa=${encodeURIComponent(empresaNombre)}`;
      window.location.href = urlComprobante;

    } catch (err) {
      resultado.innerHTML = `<p class="fallo">${err.message === "Boletas agotadas para esta empresa" ? "Ya no hay boletas disponibles para esta empresa." : "Error al registrar. Intenta de nuevo."}</p>`;
      console.error(err);
      btn.disabled = false;
      btn.innerHTML = "Registrar";
    }
  };
</script>

</body>
</html>
