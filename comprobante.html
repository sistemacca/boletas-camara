<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

  const cfg = {
    apiKey: "AIzaSyD75kntcW_TqAJznShE50ACAgvgjp1DlQc",
    authDomain: "semana-comercial.firebaseapp.com",
    projectId: "semana-comercial",
    storageBucket: "semana-comercial.firebasestorage.app",
    messagingSenderId: "52687643666",
    appId: "1:52687643666:web:48e7106b88b2f2c2b364cb"
  };

  const db = getFirestore(initializeApp(cfg));

  function mostrarError(msg) {
    document.getElementById("estado-cargando").style.display = "none";
    document.getElementById("estado-error").style.display = "block";
    document.getElementById("error-detalle").textContent = msg;
  }

  const params = new URLSearchParams(window.location.search);
  const pBoleta = params.get("boleta");
  const pEmpresa = params.get("empresa");
  const pId = params.get("id"); // ESTA ES LA LLAVE DE SEGURIDAD

  if (!pId || !pBoleta || !pEmpresa) {
    mostrarError("Acceso Denegado: El enlace no contiene los parámetros de seguridad necesarios.");
  } else {
    (async () => {
      try {
        // BUSCAMOS EL REGISTRO POR SU ID ÚNICO (No por número de boleta)
        const docRef = doc(db, "registros", pId);
        const snap = await getDoc(docRef);

        if (!snap.exists()) {
          mostrarError("El comprobante no existe o es inválido.");
          return;
        }

        const datos = snap.data();

        // VALIDACIÓN DE SEGURIDAD:
        // Verificamos que el número de boleta en la URL coincida con el guardado en la base de datos
        if (datos.boleta != pBoleta || datos.empresa !== pEmpresa) {
          mostrarError("Alerta de Seguridad: Se ha detectado una modificación manual en el número de boleta.");
          return;
        }

        // Si todo es correcto, buscamos el nombre de la empresa
        const empSnap = await getDoc(doc(db, "empresas", pEmpresa));
        const empresaNombre = empSnap.exists() ? empSnap.data().nombre : pEmpresa;

        // MOSTRAR DATOS REALES
        document.getElementById("nombre").textContent = datos.nombre;
        document.getElementById("boleta").textContent = datos.boleta;
        document.getElementById("empresa").textContent = empresaNombre;
        document.getElementById("estado-cargando").style.display = "none";
        document.getElementById("estado-ok").style.display = "block";

      } catch (e) {
        mostrarError("Error al verificar la boleta.");
        console.error(e);
      }
    })();
  }
</script>
