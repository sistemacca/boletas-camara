<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Comprobante Oficial - Semana Comercial</title>
  <style>
    /* Estilos mantenidos según tu diseño original */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: white; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); border-top: 6px solid #007d42; overflow: hidden; text-align: center; width: 100%; max-width: 420px; }
    .header { background: #007d42; padding: 24px 20px 20px; }
    .header img { height: 52px; filter: brightness(0) invert(1); margin-bottom: 10px; }
    .header .subtitulo { color: rgba(255,255,255,0.8); font-size: 12px; letter-spacing: 1px; text-transform: uppercase; }
    .body { padding: 28px 24px; }
    .check { width: 52px; height: 52px; background: #dcfce7; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; margin: 0 auto 14px; font-size: 24px; }
    .badge-success { font-size: 13px; font-weight: 600; color: #16a34a; margin-bottom: 4px; text-transform: uppercase; }
    .empresa { font-size: 15px; font-weight: 700; color: #007d42; margin-bottom: 4px; }
    .nombre-usuario { font-size: 16px; font-weight: 600; color: #1e293b; margin-bottom: 20px; }
    .boleta-box { background: #f0f4f8; border-radius: 14px; padding: 20px; margin-bottom: 20px; border: 2px dashed #007d42; }
    .boleta-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .numero { font-size: 64px; font-weight: 700; color: #007d42; line-height: 1; }
    .btn { width: 100%; padding: 14px; background: #007d42; color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; margin-bottom: 12px; }
    .btn:hover { background: #005a30; }
    .captura-box { background: #f0fdf4; border-radius: 10px; padding: 12px; border: 1px solid #bbf7d0; }
    .footer-text { font-size: 11px; color: #94a3b8; margin-top: 20px; }
    #estado-cargando { display: flex; flex-direction: column; align-items: center; padding: 48px 24px; gap: 16px; }
    .spin { width: 36px; height: 36px; border: 3px solid #e2e8f0; border-top-color: #007d42; border-radius: 50%; animation: giro 0.7s linear infinite; }
    @keyframes giro { to { transform: rotate(360deg); } }
    #estado-error { display: none; padding: 36px 24px; }
    .error-icon { font-size: 48px; margin-bottom: 12px; }
    .error-titulo { font-size: 18px; font-weight: 700; color: #dc2626; margin-bottom: 8px; }
    .error-msg { font-size: 13px; color: #64748b; line-height: 1.6; }
    #estado-ok { display: none; }
  </style>
</head>
<body>
<div class="card">
  <div class="header">
    <img src="https://sistemacca.github.io/boletas-camara/logo.png">
    <div class="subtitulo">Semana Comercial 2026</div>
  </div>

  <div id="estado-cargando">
    <div class="spin"></div>
    <p>Verificando registro oficial...</p>
  </div>

  <div id="estado-error" class="body">
    <div class="error-icon">⚠️</div>
    <div class="error-titulo">Validación Fallida</div>
    <div class="error-msg" id="error-detalle">No se pudo verificar la autenticidad de este comprobante.</div>
  </div>

  <div id="estado-ok">
    <div class="body">
      <div class="check">✅</div>
      <div class="badge-success">Registro Verificado</div>
      <div class="empresa" id="empresa">Cargando...</div>
      <div class="nombre-usuario" id="nombre">Cargando...</div>
      <div class="boleta-box">
        <div class="boleta-label">Número de boleta</div>
        <div class="numero" id="boleta">---</div>
      </div>
      <button class="btn" id="btn-descargar" onclick="descargarJPG()">📸 Descargar Comprobante</button>
      <div class="captura-box">
        <div style="font-size:12px;font-weight:600;color:#166534">Información Protegida</div>
        <div style="font-size:11px;color:#4b7a5e;margin-top:2px">Este documento ha sido validado por el sistema central.</div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getFirestore, collection, query, where, getDocs, doc, getDoc }
    from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

  const cfg = {
    apiKey:            "AIzaSyD75kntcW_TqAJznShE50ACAgvgjp1DlQc",
    authDomain:        "semana-comercial.firebaseapp.com",
    projectId:         "semana-comercial",
    storageBucket:     "semana-comercial.firebasestorage.app",
    messagingSenderId: "52687643666",
    appId:             "1:52687643666:web:48e7106b88b2f2c2b364cb"
  };

  const db = getFirestore(initializeApp(cfg));

  function mostrarError(msg) {
    document.getElementById("estado-cargando").style.display = "none";
    document.getElementById("estado-ok").style.display       = "none";
    document.getElementById("estado-error").style.display    = "block";
    if (msg) document.getElementById("error-detalle").textContent = msg;
  }

  function mostrarComprobante(nombre, boleta, empresaNombre) {
    document.getElementById("nombre").textContent  = nombre;
    document.getElementById("boleta").textContent  = boleta;
    document.getElementById("empresa").textContent = empresaNombre;
    
    // Solo mostramos el contenido después de haber inyectado los datos de la DB
    document.getElementById("estado-cargando").style.display = "none";
    document.getElementById("estado-ok").style.display       = "block";
  }

  const params  = new URLSearchParams(window.location.search);
  const pBoleta = (params.get("boleta")  || "").trim();
  const pEmpresa = (params.get("empresa") || "").trim();

  // NOTA: Ya no extraemos el "nombre" de la URL para evitar manipulaciones visuales.

  if (!pBoleta || !pEmpresa) {
    mostrarError("El enlace de acceso es inválido o está incompleto.");
  } else {
    (async () => {
      try {
        // 1. Verificar existencia de la empresa
        const empSnap = await getDoc(doc(db, "empresas", pEmpresa));
        if (!empSnap.exists()) {
          mostrarError("La empresa asociada a este registro no es válida.");
          return;
        }
        const empresaNombreOficial = empSnap.data().nombre || pEmpresa;

        // 2. Buscar el registro real en la base de datos por el número de boleta
        const snap = await getDocs(
          query(collection(db, "registros"), where("boleta", "==", Number(pBoleta)))
        );

        if (snap.empty) {
          mostrarError("No existe ningún registro oficial con el número de boleta proporcionado.");
          return;
        }

        const datosReales = snap.docs[0].data();

        // 3. VALIDACIÓN DE SEGURIDAD: ¿La boleta pertenece realmente a esta empresa?
        // Esto evita que alguien use una boleta válida de la Empresa A en un link de la Empresa B.
        if (datosReales.empresa !== pEmpresa) {
          mostrarError("Inconsistencia de datos: El comprobante no coincide con la empresa emisora.");
          return;
        }

        // 4. Mostrar datos usando EXCLUSIVAMENTE lo que devolvió Firebase (datosReales)
        mostrarComprobante(datosReales.nombre, datosReales.boleta, empresaNombreOficial);

      } catch(e) {
        mostrarError("Error de conexión con el servidor de validación.");
        console.error(e);
      }
    })();
  }

  window.descargarJPG = function() {
    // La función de descarga ahora toma los valores directamente de los IDs que nosotros llenamos con la DB
    const nombreV  = document.getElementById("nombre").textContent;
    const boletaV  = document.getElementById("boleta").textContent;
    const empresaV = document.getElementById("empresa").textContent;
    
    const btn = document.getElementById("btn-descargar");
    btn.textContent = "Generando archivo...";
    btn.disabled = true;
    
    try {
      const W = 600, H = 450;
      const cv = document.createElement("canvas");
      cv.width = W; cv.height = H;
      const ctx = cv.getContext("2d");
      
      // Fondo y bordes
      ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = "#f0fdf4"; ctx.fillRect(10, 10, W-20, H-20);
      ctx.strokeStyle = "#007d42"; ctx.lineWidth = 4; ctx.strokeRect(10, 10, W-20, H-20);

      // Texto
      ctx.fillStyle = "#007d42"; ctx.font = "bold 24px Arial"; ctx.textAlign = "center";
      ctx.fillText("CÁMARA DE COMERCIO DE ARAUCA", W/2, 60);
      
      ctx.font = "16px Arial"; ctx.fillStyle = "#64748b";
      ctx.fillText("Semana Comercial 2026", W/2, 90);
      
      ctx.fillStyle = "#1e293b"; ctx.font = "bold 18px Arial";
      ctx.fillText(empresaV.toUpperCase(), W/2, 140);
      
      ctx.font = "20px Arial"; ctx.fillStyle = "#334155";
      ctx.fillText(nombreV, W/2, 180);
      
      ctx.fillStyle = "#007d42"; ctx.font = "bold 100px Arial";
      ctx.fillText(boletaV, W/2, 300);
      
      ctx.font = "bold 14px Arial"; ctx.fillStyle = "#64748b";
      ctx.fillText("NÚMERO DE BOLETA OFICIAL", W/2, 330);
      
      ctx.font = "italic 12px Arial"; ctx.fillStyle = "#94a3b8";
      ctx.fillText("Validado digitalmente el " + new Date().toLocaleDateString(), W/2, 400);

      cv.toBlob(function(blob) {
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url; link.download = "Comprobante_" + boletaV + ".jpg";
        link.click();
        btn.textContent = "✓ Descargado";
        setTimeout(() => { btn.textContent = "📸 Descargar Comprobante"; btn.disabled = false; }, 3000);
      }, "image/jpeg", 0.95);
    } catch(e) {
      alert("Error al generar imagen. Por favor toma una captura de pantalla.");
      btn.disabled = false;
    }
  };
</script>
</body>
</html>
