<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Semana Comercial - Cámara de Comercio de Arauca</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

  body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 28px 20px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.1);
      border-top: 6px solid #003366;
    }

    .logo {
      text-align: center;
      margin-bottom: 24px;
    }

    .logo h2 { color: #003366; font-size: 22px; margin-bottom: 4px; }
    .logo p  { color: #64748b; font-size: 13px; }
    .logo .empresa-nombre {
      display: inline-block;
      margin-top: 8px;
      background: #e8f0fe;
      color: #003366;
      font-size: 13px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
    }

    .campo { margin-bottom: 14px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #003366;
      margin-bottom: 5px;
    }

    label span { color: #e11d48; }

    input {
      width: 100%;
      padding: 11px 13px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #003366;
      box-shadow: 0 0 0 3px rgba(0,51,102,0.08);
    }

    input.error { border-color: #e11d48; }

    .msg-error {
      font-size: 11px;
      color: #e11d48;
      margin-top: 4px;
      display: none;
    }

    button {
      width: 100%;
      padding: 13px;
      background: #003366;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }

    button:hover:not(:disabled) { background: #002244; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }

    .resultado { margin-top: 20px; text-align: center; }

    .exito {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 10px;
      padding: 0;
      color: #166534;
    }

    .exito .numero {
      font-size: 52px;
      font-weight: 700;
      color: #003366;
      display: block;
      margin: 8px 0 4px;
    }

    .exito .sub { font-size: 13px; color: #4b7a5e; }

    .fallo {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 12px;
      color: #991b1b;
      font-size: 14px;
    }

    .cargando {
      text-align: center;
      padding: 30px 0;
      color: #64748b;
      font-size: 14px;
    }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid #ffffff55;
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    .spinner-dark {
      display: inline-block;
      width: 20px; height: 20px;
      border: 2px solid #cbd5e1;
      border-top-color: #003366;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 10px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      body { padding: 0; align-items: flex-start; justify-content: flex-start; }
      .card { max-width: 100%; min-height: 100vh; border-radius: 0; border-top: 6px solid #003366; box-shadow: none; padding: 28px 20px; }
      input { font-size: 16px; }
      button { font-size: 16px; padding: 15px; }
    }

    @media (max-width: 480px) {
      body { padding: 12px; align-items: flex-start; padding-top: 20px; }
      .card { border-radius: 12px; padding: 24px 16px; }
      .logo h2 { font-size: 19px; }
      input { font-size: 16px; padding: 13px; }
      button { font-size: 16px; padding: 15px; }
    }
  </style>
</head>
<body>

<div class="card" id="card-formulario">
  <div class="logo">
    <img src="https://sistemacca.github.io/boletas-camara/logo.png" style="height:50px;margin-bottom:12px"><br><h2>Semana Comercial</h2>
    <span class="empresa-nombre" id="empresa-label">Cargando...</span>
  </div>

  <!-- Formulario (oculto hasta cargar empresa) -->
  <div id="formulario" style="display:none">
    <div class="campo">
      <label for="nombre">Nombre completo <span>*</span></label>
      <input type="text" id="nombre" autocomplete="name" placeholder="Tu nombre completo">
      <div class="msg-error" id="err-nombre">Ingresa tu nombre</div>
    </div>

    <div class="campo">
      <label for="telefono">Teléfono <span>*</span></label>
      <input type="tel" id="telefono" inputmode="numeric" autocomplete="tel"
             placeholder="3XXXXXXXXX" maxlength="12">
      <div class="msg-error" id="err-telefono">Ingresa un número de 10 dígitos</div>
    </div>

    <div class="campo">
      <label for="email">Email</label>
      <input type="email" id="email" autocomplete="email" placeholder="correo@ejemplo.com">
      <div class="msg-error" id="err-email">Ingresa un email válido</div>
    </div>

    <div class="campo">
      <label for="direccion">Dirección</label>
      <input type="text" id="direccion" autocomplete="street-address" placeholder="Opcional">
    </div>

    <button id="btn" onclick="registrar()">Registrar</button>
  </div>

  <div class="resultado" id="resultado"></div>
</div>

<div id="comprobante-externo" style="display:none;width:100%;max-width:420px;margin:0 auto;text-align:center"></div>

<script type="module">
  import { initializeApp }       from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getFirestore,
           collection, addDoc,
           runTransaction,
           doc, getDoc }         from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyD75kntcW_TqAJznShE50ACAgvgjp1DlQc",
    authDomain:        "semana-comercial.firebaseapp.com",
    projectId:         "semana-comercial",
    storageBucket:     "semana-comercial.firebasestorage.app",
    messagingSenderId: "52687643666",
    appId:             "1:52687643666:web:48e7106b88b2f2c2b364cb"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // Empresa desde URL
  const EMPRESA = new URLSearchParams(window.location.search).get("empresa") || "";

  // ── Cargar empresa y validar que existe ──────────────────
  async function cargarEmpresa() {
    const resultado = document.getElementById("resultado");

    if (!EMPRESA) {
      resultado.innerHTML = '<p class="fallo">Enlace sin empresa. Contacta al organizador.</p>';
      document.getElementById("empresa-label").textContent = "Sin empresa";
      return;
    }

    try {
      const snap = await getDoc(doc(db, "empresas", EMPRESA));

      if (!snap.exists()) {
        resultado.innerHTML = '<p class="fallo">Empresa no registrada. Contacta al organizador.</p>';
        document.getElementById("empresa-label").textContent = "No encontrada";
        return;
      }

      const data = snap.data();

      // Mostrar nombre de empresa
      document.getElementById("empresa-label").textContent =
        data.nombre || EMPRESA;

      // Mostrar formulario
      document.getElementById("formulario").style.display = "block";

    } catch (e) {
      resultado.innerHTML = '<p class="fallo">Error al cargar. Intenta de nuevo.</p>';
    }
  }

  cargarEmpresa();

  // ── Validaciones ─────────────────────────────────────────
  function esEmailValido(e) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);
  }

  function esTelefonoValido(t) {
    let l = t.replace(/\D/g, "");
    if (l.length === 12 && l.startsWith("57")) l = l.substring(2);
    return l.length === 10;
  }

  function marcar(inputId, errId, valido) {
    document.getElementById(inputId).classList.toggle("error", !valido);
    document.getElementById(errId).style.display = valido ? "none" : "block";
    return valido;
  }

  // ── Registrar ────────────────────────────────────────────
  window.registrar = async function () {
    const nombre    = document.getElementById("nombre").value.trim();
    const telefono  = document.getElementById("telefono").value.trim();
    const email     = document.getElementById("email").value.trim();
    const direccion = document.getElementById("direccion").value.trim();
    const btn       = document.getElementById("btn");
    const resultado = document.getElementById("resultado");

    resultado.innerHTML = "";

    // Validar campos
    let ok = true;
    ok = marcar("nombre",   "err-nombre",   nombre.length >= 2)          && ok;
    ok = marcar("telefono", "err-telefono", esTelefonoValido(telefono))   && ok;
    if (email) ok = marcar("email", "err-email", esEmailValido(email))    && ok;
    if (!ok) return;

    btn.disabled  = true;
    btn.innerHTML = '<span class="spinner"></span>Procesando...';

    try {
      const empresaRef  = doc(db, "empresas", EMPRESA);
      const contadorRef = doc(db, "contadores", EMPRESA);
      let numeroBoleta;

      await runTransaction(db, async (tx) => {
        // Leer empresa (rangos)
        const empSnap = await tx.get(empresaRef);
        if (!empSnap.exists()) throw new Error("Empresa no encontrada");

        const { desde, hasta } = empSnap.data();

        // Leer contador actual
        const contSnap = await tx.get(contadorRef);
        const actual   = contSnap.exists() ? contSnap.data().actual : 0;

        // Validar que quedan boletas disponibles
        const siguiente = desde + actual;
        if (siguiente > hasta) throw new Error("Boletas agotadas para esta empresa");

        numeroBoleta = siguiente;

        // Actualizar contador
        tx.set(contadorRef, { actual: actual + 1 });
      });

      // Guardar registro
      await addDoc(collection(db, "registros"), {
        empresa:   EMPRESA,
        boleta:    numeroBoleta,
        nombre,
        telefono,
        email:     email || "",
        direccion: direccion || "",
        fecha:     new Date().toISOString()
      });

      // Mostrar resultado
      const empresaNombre = document.getElementById("empresa-label").textContent || EMPRESA;

      // Ocultar card entera y mostrar comprobante fuera
      document.getElementById("card-formulario").style.display = "none";
      const compExt = document.getElementById("comprobante-externo");
      compExt.style.display = "block";
      compExt.innerHTML = `
        <div id="comprobante" style="background:white;border-radius:20px;box-shadow:0 8px 30px rgba(0,0,0,0.1);border-top:6px solid #003366;overflow:hidden;text-align:center;width:100%;max-width:420px;margin:0 auto;font-family:'Segoe UI',Arial,sans-serif">
          <!-- ENCABEZADO -->
          <div style="background:#003366;padding:24px 20px 20px;text-align:center;display:block">
            <img src="https://sistemacca.github.io/boletas-camara/logo.png"
                 style="height:52px;filter:brightness(0) invert(1);margin-bottom:10px">
            <div style="color:rgba(255,255,255,0.8);font-size:12px;letter-spacing:1px;text-transform:uppercase">Semana Comercial 2026</div>
          </div>

          <!-- CUERPO -->
          <div style="padding:28px 24px;text-align:center">

            <!-- Check de éxito -->
            <div style="width:52px;height:52px;background:#dcfce7;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:24px">✅</div>

            <div style="font-size:13px;font-weight:600;color:#16a34a;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px">Registro exitoso</div>

            <div style="font-size:15px;font-weight:700;color:#003366;margin-bottom:4px">${empresaNombre}</div>
            <div class="nombre-usuario" style="font-size:16px;font-weight:600;color:#1e293b;margin-bottom:20px;text-align:center">${nombre}</div>

            <!-- Número de boleta -->
            <div style="background:#f0f4f8;border-radius:14px;padding:20px;margin-bottom:20px;border:2px dashed #003366">
              <div style="font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Tu número de boleta</div>
              <div class="numero" style="font-size:64px;font-weight:700;color:#003366;line-height:1">${numeroBoleta}</div>
            </div>

            <!-- Botón descargar -->
            <button id="btn-descargar" onclick="descargarJPG()"
              style="width:100%;padding:14px;background:#003366;color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:12px;letter-spacing:0.3px;text-align:center">
              ⬇ Descargar comprobante
            </button>

            <!-- Captura -->
            <div style="background:#f0fdf4;border-radius:10px;padding:12px;border:1px solid #bbf7d0">
              <div style="font-size:18px;margin-bottom:3px">📸</div>
              <div style="font-size:12px;font-weight:600;color:#166534">O toma captura de pantalla</div>
              <div style="font-size:11px;color:#4b7a5e;margin-top:2px">Guarda este número como comprobante</div>
            </div>

          </div>
        </div>
      `;

      resultado.innerHTML = '';
      // Scroll al inicio para que el comprobante sea lo primero visible
      window.scrollTo({ top: 0, behavior: 'smooth' });

      // Limpiar formulario
      ["nombre","telefono","email","direccion"].forEach(id =>
        document.getElementById(id).value = ""
      );

    } catch (err) {
      resultado.innerHTML = `<p class="fallo">${err.message === "Boletas agotadas para esta empresa"
        ? "Ya no hay boletas disponibles para esta empresa."
        : "Error al registrar. Intenta de nuevo."}</p>`;
      console.error(err);
    }

    btn.disabled  = false;
    btn.innerHTML = "Registrar";
  };

  window.descargarJPG = function() {
    const btn = document.getElementById("btn-descargar");
    btn.textContent = "Generando...";
    btn.disabled = true;

    try {
      const empresa = document.getElementById("empresa-label") ? document.getElementById("empresa-label").textContent : "";
      const contenedor = document.getElementById("comprobante-externo") || document.getElementById("resultado");
      const nombreEl = contenedor.querySelector(".nombre-usuario");
      const boletaEl = contenedor.querySelector(".numero");
      const nombre = nombreEl ? nombreEl.textContent : "";
      const boleta = boletaEl ? boletaEl.textContent : "";

      const W = 600, H = 400;
      const cv = document.createElement("canvas");
      cv.width = W; cv.height = H;
      const ctx = cv.getContext("2d");

      // Fondo blanco
      ctx.fillStyle = "#f0fdf4";
      ctx.fillRect(0, 0, W, H);

      // Borde superior azul
      ctx.fillStyle = "#003366";
      ctx.fillRect(0, 0, W, 8);

      // Borde inferior dorado
      ctx.fillStyle = "#d4af37";
      ctx.fillRect(0, H - 6, W, 6);

      // Encabezado
      ctx.fillStyle = "#003366";
      ctx.font = "bold 20px Arial";
      ctx.textAlign = "center";
      ctx.fillText("Cámara de Comercio de Arauca", W/2, 52);

      ctx.font = "14px Arial";
      ctx.fillStyle = "#64748b";
      ctx.fillText("Semana Comercial 2026", W/2, 76);

      // Separador
      ctx.strokeStyle = "#e2e8f0";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(40, 95); ctx.lineTo(W-40, 95);
      ctx.stroke();

      // Empresa
      ctx.font = "bold 15px Arial";
      ctx.fillStyle = "#003366";
      ctx.fillText(empresa, W/2, 125);

      // Nombre
      ctx.font = "16px Arial";
      ctx.fillStyle = "#1e293b";
      ctx.fillText(nombreUsuario, W/2, 155);

      // Número boleta
      ctx.font = "bold 90px Arial";
      ctx.fillStyle = "#003366";
      ctx.fillText(boleta, W/2, 260);

      ctx.font = "14px Arial";
      ctx.fillStyle = "#64748b";
      ctx.fillText("Número de boleta", W/2, 288);

      // Separador
      ctx.strokeStyle = "#e2e8f0";
      ctx.beginPath();
      ctx.moveTo(40, 308); ctx.lineTo(W-40, 308);
      ctx.stroke();

      // Pie
      ctx.font = "bold 13px Arial";
      ctx.fillStyle = "#166534";
      ctx.fillText("✓ Comprobante oficial de registro", W/2, 338);

      ctx.font = "12px Arial";
      ctx.fillStyle = "#64748b";
      ctx.fillText("Conserva este documento como soporte", W/2, 360);

      // Descargar — compatible PC y móvil
      cv.toBlob(function(blob) {
        const url  = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href     = url;
        link.download = "boleta-" + boleta + "-semana-comercial.jpg";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        setTimeout(() => URL.revokeObjectURL(url), 1000);

        btn.innerHTML = "✓ Descargado";
        btn.style.background = "#16a34a";
        setTimeout(() => {
          btn.innerHTML = "⬇ Descargar comprobante";
          btn.style.background = "#003366";
          btn.disabled = false;
        }, 2500);
      }, "image/jpeg", 0.95);

    } catch(e) {
      console.error(e);
      btn.innerHTML = "⬇ Descargar comprobante";
      btn.disabled = false;
      alert("No se pudo generar. Toma una captura de pantalla.");
    }
  };
</script>

</body>
</html>
